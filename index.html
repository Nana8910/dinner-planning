const { useReducer, useEffect, useState, useMemo } = React;


/* ------------------------------------------------------------------ *
 *  ツクリオリオ — ツクリオの一週間こんだてプランナー
 *  冷蔵のおかずは前半に、冷凍できるものは後半にまわして使い切る。
 *  献立は「絶対日付」で保持し、過去は「りれき」カレンダーで振り返る。
 * ------------------------------------------------------------------ */

const WD = ["日", "月", "火", "水", "木", "金", "土"];

function todayISO() {
  return isoOf(new Date());
}
function isoOf(d) {
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${d.getFullYear()}-${m}-${day}`;
}
function addDaysISO(iso, n) {
  const d = new Date(iso + "T00:00:00");
  d.setDate(d.getDate() + n);
  return isoOf(d);
}
function daysBetween(aISO, bISO) {
  const a = new Date(aISO + "T00:00:00");
  const b = new Date(bISO + "T00:00:00");
  return Math.round((b - a) / 86400000);
}
/* どの日付を渡しても、その週の月曜日を返す（こんだては月曜はじまり） */
function mondayISO(iso) {
  const d = new Date((iso || todayISO()) + "T00:00:00");
  const wd = d.getDay(); // 0=日, 1=月, ... 6=土
  d.setDate(d.getDate() + (wd === 0 ? -6 : 1 - wd));
  return isoOf(d);
}
/* お届け週ID "20260427" <-> "2026-04-27"（＝その週の月曜） */
function weekStartISO(id) {
  return `${id.slice(0, 4)}-${id.slice(4, 6)}-${id.slice(6, 8)}`;
}
function idOfMonday(iso) {
  return iso.replace(/-/g, "");
}
function fmtMD(iso) {
  const d = new Date(iso + "T00:00:00");
  return `${d.getMonth() + 1}/${d.getDate()}`;
}
function wdOf(iso) {
  return WD[new Date(iso + "T00:00:00").getDay()];
}
function weekLabelFromMonday(monISO) {
  return `${fmtMD(monISO)}〜${fmtMD(addDaysISO(monISO, 6))}`;
}
/* 今日を含む（まだ終わっていない）最初のお届け週を選ぶ */
function pickCurrentWeek(weeks) {
  const list = weeks && weeks.length ? weeks : WEEKS;
  const today = todayISO();
  const sorted = [...list].sort((a, b) => a.id.localeCompare(b.id));
  for (const w of sorted) {
    const sun = addDaysISO(weekStartISO(w.id), 6);
    if (sun >= today) return w;
  }
  return sorted[sorted.length - 1];
}
function uid() {
  return Math.random().toString(36).slice(2, 9);
}

/* 同一オリジンの menu.json（GitHub Actions が毎週自動更新）を読みにいく。
 * 取れなければ null を返し、ハードコードの WEEKS をフォールバックに使う。 */
async function loadMenu() {
  try {
    const res = await fetch("./menu.json?ts=" + Date.now(), { cache: "no-store" });
    if (!res.ok) return null;
    const data = await res.json();
    if (data && Array.isArray(data.weeks) && data.weeks.length > 0) return data;
  } catch {
    /* ネット断・404・パース失敗などは無視してフォールバック */
  }
  return null;
}

/* ツクリオ公式お届けメニューのフォールバック（menu.json が取れない時のみ使用）。 */
const WEEKS = [
  {
    id: "20260615",
    label: "6/15〜6/21",
    recommend: "みそ旨チーズタッカルビ",
    dishes: [
      { name: "みそ旨チーズタッカルビ", category: "main", freezable: true },
      { name: "塩まーぼー", category: "main", freezable: false },
      { name: "豚肉とレンコンのイタリア風煮込み", category: "main", freezable: true },
      { name: "定番の五目白和え", category: "side", freezable: true },
      { name: "小松菜とごぼうの胡麻和え", category: "side", freezable: false },
      { name: "クリームソースのかぼちゃニョッキ", category: "side", freezable: false },
      { name: "5種野菜のみぞれ煮", category: "side", freezable: true },
      { name: "さつま揚げと糸こんにゃくの甘辛炒め", category: "side", freezable: false },
    ],
  },
];

const initialSettings = { people: 2, freshDays: 3, theme: "default" };
const blankState = () => ({ recipes: [], dishes: [], settings: { ...initialSettings } });

/* 配置/ストックの実体（ツクリオ取り込み分＋自作から置いた分）。
 * date===null はストック、date がある日に置かれている。weekId は「届いた週」。 */
function makeDish(d) {
  return {
    id: uid(),
    name: d.name.trim(),
    category: d.category || "main",
    freezable: !!d.freezable,
    servings: d.servings || 2,
    source: d.source || "tsukurioki",
    kid: !!d.kid,
    weekId: d.weekId || null,
    date: null, // 'YYYY-MM-DD' | null
    storage: null, // 'fridge' | 'frozen'
    status: "planned", // 'planned' | 'eaten'
  };
}
/* 自作レシピ帳のテンプレ（再利用可・グローバル）。 */
function makeRecipe(d) {
  return {
    id: uid(),
    name: d.name.trim(),
    category: d.category || "main",
    freezable: !!d.freezable,
  };
}

/* 冷蔵/冷凍の判定：届いた週の月曜から freshDays 日以上あとに食べるなら冷凍。 */
function storageForDate(dish, dateISO, freshDays) {
  if (!dish.freezable) return "fridge";
  const refMon = dish.weekId ? weekStartISO(dish.weekId) : mondayISO(dateISO);
  return daysBetween(refMon, dateISO) >= freshDays ? "frozen" : "fridge";
}

/* ---- 自動ふりわけ: 指定週のストックを、月曜から主菜1・副菜1ずつ埋める ---- */
function autoArrangeWeek(dishes, weekId, settings) {
  const { freshDays } = settings;
  const mon = weekStartISO(weekId);
  const weekDates = Array.from({ length: 7 }, (_, i) => addDaysISO(mon, i));
  const order = (list) => [
    ...list.filter((d) => !d.freezable), // 冷蔵のみ→先（前半で食べきる）
    ...list.filter((d) => d.freezable), // 冷凍可→後ろ（後半にまわす）
  ];
  // この週の未食を一旦ストックに戻す（クローン）。他の週はそのまま。
  const next = dishes.map((d) =>
    d.weekId === weekId && d.status !== "eaten" ? { ...d, date: null, storage: null } : d
  );
  const movable = next.filter((d) => d.weekId === weekId && d.status !== "eaten");
  const mains = order(movable.filter((d) => d.category === "main"));
  const sides = order(movable.filter((d) => d.category === "side"));
  for (let i = 0; i < 7; i++) {
    if (mains[i]) {
      mains[i].date = weekDates[i];
      mains[i].storage = storageForDate(mains[i], weekDates[i], freshDays);
    }
    if (sides[i]) {
      sides[i].date = weekDates[i];
      sides[i].storage = storageForDate(sides[i], weekDates[i], freshDays);
    }
  }
  return next;
}

function reducer(state, action) {
  switch (action.type) {
    case "LOAD":
      return action.payload;
    case "SET_SETTINGS":
      return { ...state, settings: { ...state.settings, ...action.patch } };
    case "ADD_DISHES":
      return { ...state, dishes: [...state.dishes, ...action.dishes.map(makeDish)] };
    case "DELETE_DISH":
      return { ...state, dishes: state.dishes.filter((d) => d.id !== action.id) };
    case "ADD_RECIPE":
      return { ...state, recipes: [...state.recipes, makeRecipe(action.recipe)] };
    case "DELETE_RECIPE":
      return { ...state, recipes: state.recipes.filter((r) => r.id !== action.id) };
    case "TOGGLE_RECIPE_FREEZE":
      return {
        ...state,
        recipes: state.recipes.map((r) =>
          r.id === action.id ? { ...r, freezable: !r.freezable } : r
        ),
      };
    case "ASSIGN":
      return {
        ...state,
        dishes: state.dishes.map((d) =>
          d.id === action.id
            ? {
                ...d,
                date: action.date,
                storage: storageForDate(d, action.date, state.settings.freshDays),
                status: "planned",
              }
            : d
        ),
      };
    case "UNASSIGN":
      return {
        ...state,
        dishes: state.dishes.map((d) =>
          d.id === action.id ? { ...d, date: null, storage: null, status: "planned" } : d
        ),
      };
    case "SET_STATUS":
      return {
        ...state,
        dishes: state.dishes.map((d) =>
          d.id === action.id ? { ...d, status: action.status } : d
        ),
      };
    case "AUTO_WEEK":
      return { ...state, dishes: autoArrangeWeek(state.dishes, action.weekId, state.settings) };
    case "CLEAR_WEEK":
      return {
        ...state,
        dishes: state.dishes.map((d) =>
          d.weekId === action.weekId
            ? { ...d, date: null, storage: null, status: "planned" }
            : d
        ),
      };
    case "RESET":
      return blankState();
    default:
      return state;
  }
}

/* 旧フォーマット（相対 dayIndex＋単一 startDate）→ 新フォーマット（絶対日付）へ移行 */
function migrateOld(saved) {
  const mon = mondayISO((saved.settings && saved.settings.startDate) || todayISO());
  const wid = idOfMonday(mon);
  const freshDays = (saved.settings && saved.settings.freshDays) || 3;
  const people = (saved.settings && saved.settings.people) || 2;
  const dishes = (saved.dishes || []).map((d) => {
    const date = d.dayIndex == null ? null : addDaysISO(mon, d.dayIndex);
    const nd = {
      id: d.id || uid(),
      name: d.name,
      category: d.category || "main",
      freezable: !!d.freezable,
      servings: d.servings || people,
      source: d.source || "tsukurioki",
      kid: !!d.kid,
      weekId: wid,
      date,
      storage: null,
      status: d.status || "planned",
    };
    if (date) nd.storage = storageForDate(nd, date, freshDays);
    return nd;
  });
  return { recipes: [], dishes, settings: { people, freshDays } };
}

/* ------------------------------- storage ------------------------------- */
const KEY = "okazu:state:v1";

const hasLocal = (() => {
  try {
    if (typeof window === "undefined" || !window.localStorage) return false;
    const probe = "__okazu_probe__";
    window.localStorage.setItem(probe, "1");
    window.localStorage.removeItem(probe);
    return true;
  } catch {
    return false;
  }
})();
const hasArtifactStore = typeof window !== "undefined" && !!window.storage;

async function loadSaved() {
  try {
    if (hasLocal) {
      const v = window.localStorage.getItem(KEY);
      return v ? JSON.parse(v) : null;
    }
    if (hasArtifactStore) {
      const r = await window.storage.get(KEY);
      return r ? JSON.parse(r.value) : null;
    }
  } catch {
    /* 壊れたデータ等は無視 */
  }
  return null;
}

async function persist(s) {
  try {
    const json = JSON.stringify(s);
    if (hasLocal) {
      window.localStorage.setItem(KEY, json);
      return;
    }
    if (hasArtifactStore) {
      await window.storage.set(KEY, json);
    }
  } catch {
    /* 容量超過等は無視 */
  }
}

/* ================================ APP ================================= */
function App() {
  const [state, dispatch] = useReducer(reducer, undefined, blankState);
  const [ready, setReady] = useState(false);
  const [tab, setTab] = useState("plan"); // 'history' | 'plan' | 'dishes'
  const [viewMonday, setViewMonday] = useState(() => mondayISO()); // 表示中の週（月曜ISO）
  const [showSettings, setShowSettings] = useState(false);
  const [sheet, setSheet] = useState(null); // { id, mode:'assign'|'move', from }
  const [toast, setToast] = useState("");
  const [menu, setMenu] = useState({ weeks: WEEKS, updatedAt: null });

  const ping = (m) => setToast(m);

  useEffect(() => {
    (async () => {
      const menuData = await loadMenu();
      const weeks = menuData ? menuData.weeks : WEEKS;
      if (menuData) setMenu({ weeks, updatedAt: menuData.updatedAt });

      const saved = await loadSaved();
      if (saved && saved.dishes) {
        const isOld =
          !saved.recipes ||
          (saved.dishes[0] && Object.prototype.hasOwnProperty.call(saved.dishes[0], "dayIndex"));
        const payload = isOld ? migrateOld(saved) : saved;
        dispatch({ type: "LOAD", payload });
        // 中身のある週を表示する（空の今週に着地して「何も無い」を防ぐ）。
        // 優先: 予定済みの最新週 → ストックがある最新週 → メニューの最新週 → 今週
        const dated = payload.dishes.filter((d) => d.date).map((d) => d.date).sort();
        const stockWeeks = payload.dishes
          .map((d) => d.weekId)
          .filter(Boolean)
          .map((id) => weekStartISO(id))
          .sort();
        let target;
        if (dated.length) target = mondayISO(dated[dated.length - 1]);
        else if (stockWeeks.length) target = mondayISO(stockWeeks[stockWeeks.length - 1]);
        else if (weeks.length) target = weekStartISO(pickCurrentWeek(weeks).id);
        else target = mondayISO();
        setViewMonday(target);
      } else {
        // 初回起動：今週お届けのおかず（週3食ぶん）をストックに入れて、すぐ見える状態に
        const wk = pickCurrentWeek(weeks);
        setViewMonday(weekStartISO(wk.id));
        const seed = wk.dishes
          .filter((d) => d.plan !== "5食")
          .map((d) => ({ ...d, source: "tsukurioki", weekId: wk.id, servings: initialSettings.people }));
        dispatch({ type: "ADD_DISHES", dishes: seed });
      }
      setReady(true);
    })();
  }, []);

  const refreshMenu = async () => {
    const data = await loadMenu();
    if (data) {
      setMenu({ weeks: data.weeks, updatedAt: data.updatedAt });
      ping(`最新メニューに更新しました（${data.weeks.length}週分）`);
    } else {
      ping("メニューを取得できませんでした");
    }
  };

  useEffect(() => {
    if (!ready) return;
    const t = setTimeout(() => persist(state), 250);
    return () => clearTimeout(t);
  }, [state, ready]);

  useEffect(() => {
    if (!toast) return;
    const t = setTimeout(() => setToast(""), 2200);
    return () => clearTimeout(t);
  }, [toast]);

  // 平成ギャル♡テーマのときだけ、必要な丸ゴシック系フォントを読み込む
  useEffect(() => {
    if (state.settings.theme !== "heisei") return;
    if (document.getElementById("heisei-fonts")) return;
    const l = document.createElement("link");
    l.id = "heisei-fonts";
    l.rel = "stylesheet";
    l.href =
      "https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=M+PLUS+Rounded+1c:wght@400;700;800&family=Zen+Maru+Gothic:wght@500;700;900&display=swap";
    document.head.appendChild(l);
  }, [state.settings.theme]);

  const { dishes, recipes, settings } = state;
  const viewWeekId = idOfMonday(viewMonday);
  const stock = useMemo(
    () => dishes.filter((d) => d.weekId === viewWeekId && d.date === null),
    [dishes, viewWeekId]
  );
  const viewMenuWeek = useMemo(
    () => menu.weeks.find((w) => w.id === viewWeekId) || null,
    [menu.weeks, viewWeekId]
  );
  const importedCount = useMemo(
    () => dishes.filter((d) => d.source === "tsukurioki" && d.weekId === viewWeekId).length,
    [dishes, viewWeekId]
  );

  const importWeek = (include5) => {
    const wk = menu.weeks.find((w) => w.id === viewWeekId);
    if (!wk) return;
    const items = wk.dishes
      .filter((d) => include5 || d.plan !== "5食")
      .map((d) => ({ ...d, source: "tsukurioki", weekId: wk.id, servings: settings.people }));
    const have = new Set(dishes.filter((d) => d.weekId === wk.id).map((d) => d.name));
    const fresh = items.filter((d) => !have.has(d.name));
    if (fresh.length === 0) {
      ping("この週はすでに取り込み済みです");
      return;
    }
    dispatch({ type: "ADD_DISHES", dishes: fresh });
    ping(`${fresh.length}品をストックに追加しました`);
  };

  const placeRecipe = (recipe) => {
    dispatch({
      type: "ADD_DISHES",
      dishes: [
        {
          name: recipe.name,
          category: recipe.category,
          freezable: recipe.freezable,
          source: "home",
          weekId: viewWeekId,
          servings: settings.people,
        },
      ],
    });
    ping(`「${recipe.name}」を ${weekLabelFromMonday(viewMonday)} のストックへ`);
  };

  return (
    <div className={"om-root" + (settings.theme === "heisei" ? " theme-heisei" : "")}>
      <style>{CSS}</style>

      <header className="om-head">
        <div className="om-brand">
          <span className="om-mark" aria-hidden>
            <span className="om-mark-i" />
          </span>
          <div>
            <h1>ツクリオリオ</h1>
            <p>ツクリオの一週間こんだてプランナー</p>
          </div>
        </div>
        <button className="om-icon" onClick={() => setShowSettings(true)} aria-label="設定">
          <Settings size={20} />
        </button>
      </header>

      <nav className="om-tabs" role="tablist">
        <button
          role="tab"
          aria-selected={tab === "history"}
          className={tab === "history" ? "on" : ""}
          onClick={() => setTab("history")}
        >
          <History size={16} /> りれき
        </button>
        <button
          role="tab"
          aria-selected={tab === "plan"}
          className={tab === "plan" ? "on" : ""}
          onClick={() => setTab("plan")}
        >
          <CalendarDays size={16} /> こんだて
        </button>
        <button
          role="tab"
          aria-selected={tab === "dishes"}
          className={tab === "dishes" ? "on" : ""}
          onClick={() => setTab("dishes")}
        >
          <PackageOpen size={16} /> おかず
        </button>
      </nav>

      <main className="om-main">
        {tab === "plan" && (
          <PlanView
            dishes={dishes}
            settings={settings}
            viewMonday={viewMonday}
            viewWeekId={viewWeekId}
            stock={stock}
            viewMenuWeek={viewMenuWeek}
            importedCount={importedCount}
            latestMenuMonday={menu.weeks.length ? weekStartISO(pickCurrentWeek(menu.weeks).id) : null}
            onPrev={() => setViewMonday(addDaysISO(viewMonday, -7))}
            onNext={() => setViewMonday(addDaysISO(viewMonday, 7))}
            onToday={() => setViewMonday(mondayISO())}
            onGoLatestMenu={() => setViewMonday(weekStartISO(pickCurrentWeek(menu.weeks).id))}
            onImport={importWeek}
            onAuto={() => {
              if (stock.length === 0 && importedCount === 0) {
                ping("先にこの週のツクリオを取り込んでね");
                return;
              }
              dispatch({ type: "AUTO_WEEK", weekId: viewWeekId });
              ping("月曜から主菜・副菜を1品ずつ置きました");
            }}
            onClear={() => dispatch({ type: "CLEAR_WEEK", weekId: viewWeekId })}
            onOpenSheet={(id, mode, from) => setSheet({ id, mode, from })}
            onStatus={(id, status) => dispatch({ type: "SET_STATUS", id, status })}
            onGoDishes={() => setTab("dishes")}
          />
        )}

        {tab === "history" && <HistoryView dishes={dishes} />}

        {tab === "dishes" && (
          <DishesView
            dishes={dishes}
            recipes={recipes}
            settings={settings}
            viewMonday={viewMonday}
            viewWeekId={viewWeekId}
            menuUpdatedAt={menu.updatedAt}
            onRefreshMenu={refreshMenu}
            onAddRecipe={(r) => {
              dispatch({ type: "ADD_RECIPE", recipe: r });
              ping("自作レシピに追加しました");
            }}
            onDeleteRecipe={(id) => dispatch({ type: "DELETE_RECIPE", id })}
            onToggleRecipeFreeze={(id) => dispatch({ type: "TOGGLE_RECIPE_FREEZE", id })}
            onDeleteDish={(id) => dispatch({ type: "DELETE_DISH", id })}
            onPlaceRecipe={placeRecipe}
            onGoPlan={() => setTab("plan")}
          />
        )}
      </main>

      {showSettings && (
        <SettingsSheet
          settings={settings}
          onChange={(patch) => dispatch({ type: "SET_SETTINGS", patch })}
          onReset={() => {
            dispatch({ type: "RESET" });
            setShowSettings(false);
            ping("すべてリセットしました");
          }}
          onClose={() => setShowSettings(false)}
        />
      )}

      {sheet && (
        <DaySheet
          dish={dishes.find((d) => d.id === sheet.id)}
          mode={sheet.mode}
          from={sheet.from}
          settings={settings}
          dishes={dishes}
          onPick={(date) => {
            dispatch({ type: "ASSIGN", id: sheet.id, date });
            setSheet(null);
            ping("ふりわけました");
          }}
          onUnassign={() => {
            dispatch({ type: "UNASSIGN", id: sheet.id });
            setSheet(null);
            ping("ストックに戻しました");
          }}
          onClose={() => setSheet(null)}
        />
      )}

      {toast && <div className="om-toast">{toast}</div>}
    </div>
  );
}

/* ------------------------------ Plan view ------------------------------ */
function PlanView({
  dishes,
  settings,
  viewMonday,
  viewWeekId,
  stock,
  viewMenuWeek,
  importedCount,
  latestMenuMonday,
  onPrev,
  onNext,
  onToday,
  onGoLatestMenu,
  onImport,
  onAuto,
  onClear,
  onOpenSheet,
  onStatus,
  onGoDishes,
}) {
  const [include5, setInclude5] = useState(false);
  const weekDates = useMemo(
    () => Array.from({ length: 7 }, (_, i) => addDaysISO(viewMonday, i)),
    [viewMonday]
  );
  const today = todayISO();
  const thisMon = mondayISO();
  const badge =
    viewMonday === thisMon ? { t: "今週", c: "now" } : viewMonday < thisMon ? { t: "過去", c: "past" } : { t: "先の週", c: "future" };

  const assignedCount = useMemo(
    () => dishes.filter((d) => weekDates.includes(d.date)).length,
    [dishes, weekDates]
  );
  const warnings = useMemo(
    () =>
      dishes.filter(
        (d) =>
          d.date &&
          weekDates.includes(d.date) &&
          d.status !== "eaten" &&
          d.storage === "fridge" &&
          !d.freezable &&
          daysBetween(viewMonday, d.date) >= settings.freshDays
      ),
    [dishes, weekDates, viewMonday, settings.freshDays]
  );

  const canImport = viewMenuWeek && importedCount === 0;
  const importCount = viewMenuWeek
    ? viewMenuWeek.dishes.filter((d) => include5 || d.plan !== "5食").length
    : 0;

  return (
    <div className="om-plan">
      {/* 週ナビ */}
      <div className="om-weeknav">
        <button className="om-weeknav-arrow" onClick={onPrev} aria-label="先週">
          <ChevronLeft size={20} />
        </button>
        <button className="om-weeknav-c" onClick={onToday}>
          <span className="om-weeknav-label">{weekLabelFromMonday(viewMonday)}</span>
          <span className={"om-weeknav-badge " + badge.c}>{badge.t}</span>
        </button>
        <button className="om-weeknav-arrow" onClick={onNext} aria-label="翌週">
          <ChevronRight size={20} />
        </button>
      </div>

      {/* 取り込みバナー */}
      {canImport && (
        <div className="om-import">
          <div className="om-import-t">
            この週のツクリオ「{viewMenuWeek.recommend}」が未取り込みです。
          </div>
          <div className="om-import-row">
            <button className="om-primary" onClick={() => onImport(include5)}>
              <Plus size={17} /> この週を取り込む（{importCount}品）
            </button>
            <button
              className={"om-mini-toggle" + (include5 ? " on" : "")}
              onClick={() => setInclude5((v) => !v)}
            >
              <span className="om-switch sm" aria-hidden>
                <span className="om-switch-knob" />
              </span>
              5食プランも含める
            </button>
          </div>
        </div>
      )}

      {/* 操作 */}
      <div className="om-actions">
        <button className="om-primary" onClick={onAuto}>
          <Sparkles size={17} /> 自動でふりわけ
        </button>
        {assignedCount > 0 && (
          <button className="om-ghost" onClick={onClear}>
            <Undo2 size={15} /> リセット
          </button>
        )}
      </div>

      {warnings.length > 0 && (
        <div className="om-warn">
          <AlertTriangle size={16} />
          <span>
            冷蔵のおかずが{warnings.length}品、{settings.freshDays}日目以降にあります。早めに食べきりましょう。
          </span>
        </div>
      )}

      {/* ストック棚 */}
      <section className="om-shelf">
        <div className="om-shelf-h">
          <PackageOpen size={15} />
          <span>みわりあて（ストック）</span>
          <em>{stock.length}品</em>
        </div>
        {stock.length === 0 ? (
          <>
            <p className="om-empty-line">
              {importedCount === 0 && !canImport ? (
                <>
                  この週のおかずはまだありません。
                  <button className="om-link" onClick={onGoDishes}>
                    「おかず」
                  </button>
                  から自作を足せます。
                </>
              ) : (
                "すべてふりわけ済みです 🎉"
              )}
            </p>
            {importedCount === 0 && !canImport && latestMenuMonday && latestMenuMonday !== viewMonday && (
              <button className="om-primary wide" onClick={onGoLatestMenu}>
                <CalendarDays size={16} /> ツクリオ最新メニュー（{weekLabelFromMonday(latestMenuMonday)}）へ
              </button>
            )}
          </>
        ) : (
          <div className="om-chips">
            {stock.map((d) => (
              <button key={d.id} className="om-chip" onClick={() => onOpenSheet(d.id, "assign")}>
                <DishDot d={d} />
                <span className="om-chip-name">{d.name}</span>
                {d.freezable ? (
                  <Snowflake size={13} className="om-frz" />
                ) : (
                  <Refrigerator size={13} className="om-frd" />
                )}
              </button>
            ))}
          </div>
        )}
      </section>

      {/* 週ボード */}
      <div className="om-scrollhint">← 横にスクロールして1週間 →</div>
      <div className="om-board">
        {weekDates.map((iso) => (
          <DayCard
            key={iso}
            iso={iso}
            isToday={iso === today}
            items={dishes.filter((d) => d.date === iso)}
            onOpenSheet={onOpenSheet}
            onStatus={onStatus}
          />
        ))}
      </div>
    </div>
  );
}

function DayCard({ iso, isToday, items, onOpenSheet, onStatus }) {
  const mains = items.filter((d) => d.category === "main");
  const sides = items.filter((d) => d.category === "side");
  return (
    <div className={"om-day" + (isToday ? " today" : "")}>
      <div className="om-day-h">
        <span className="om-wd">{wdOf(iso)}</span>
        <span className="om-dt">{fmtMD(iso)}</span>
        {isToday && <span className="om-today-tag">きょう</span>}
      </div>
      <div className="om-day-body">
        {items.length === 0 ? (
          <p className="om-day-empty">—</p>
        ) : (
          <>
            {mains.length > 0 && (
              <DishGroup label="主菜" items={mains} onOpenSheet={onOpenSheet} onStatus={onStatus} from={iso} />
            )}
            {sides.length > 0 && (
              <DishGroup label="副菜" items={sides} onOpenSheet={onOpenSheet} onStatus={onStatus} from={iso} />
            )}
          </>
        )}
      </div>
    </div>
  );
}

function DishGroup({ label, items, onOpenSheet, onStatus, from }) {
  return (
    <div className="om-group">
      <span className="om-group-l">{label}</span>
      {items.map((d) => (
        <PlannedDish key={d.id} d={d} from={from} onOpenSheet={onOpenSheet} onStatus={onStatus} />
      ))}
    </div>
  );
}

function PlannedDish({ d, from, onOpenSheet, onStatus }) {
  const [open, setOpen] = useState(false);
  const eaten = d.status === "eaten";
  return (
    <div className={"om-pd " + (d.storage === "frozen" ? "frz" : "frd") + (eaten ? " eaten" : "")}>
      <button className="om-pd-main" onClick={() => setOpen((v) => !v)}>
        <span className="om-pd-badge">
          {d.storage === "frozen" ? <Snowflake size={12} /> : <Refrigerator size={12} />}
          {d.storage === "frozen" ? "冷凍" : "冷蔵"}
        </span>
        <span className="om-pd-name">{d.name}</span>
        {eaten && <Check size={14} className="om-eaten-i" />}
      </button>
      {open && (
        <div className="om-pd-menu">
          {!eaten ? (
            <>
              <button onClick={() => { onStatus(d.id, "eaten"); setOpen(false); }}>
                <Check size={14} /> 食べた
              </button>
              <button onClick={() => { onOpenSheet(d.id, "move", from); setOpen(false); }}>
                <ArrowRight size={14} /> 後日にまわす
              </button>
              <button onClick={() => { onOpenSheet(d.id, "assign", from); setOpen(false); }}>
                <PackageOpen size={14} /> 別の日／ストックへ
              </button>
            </>
          ) : (
            <button onClick={() => { onStatus(d.id, "planned"); setOpen(false); }}>
              <Undo2 size={14} /> 食べたを取り消す
            </button>
          )}
        </div>
      )}
    </div>
  );
}

function DishDot({ d }) {
  return (
    <span
      className="om-dot"
      style={{ background: d.category === "main" ? "var(--accent)" : "var(--olive)" }}
      title={d.category === "main" ? "主菜" : "副菜"}
    />
  );
}

/* ------------------------------ Day sheet ------------------------------ */
function DaySheet({ dish, mode, from, settings, dishes, onPick, onUnassign, onClose }) {
  if (!dish) return null;
  const baseMon = dish.weekId ? weekStartISO(dish.weekId) : mondayISO(from || todayISO());
  const days = Array.from({ length: 7 }, (_, i) => addDaysISO(baseMon, i));
  const title =
    mode === "move" ? "後日にまわす" : mode === "assign" && from != null ? "別の日へ移す" : "どの日に食べる？";
  return (
    <div className="om-modal-wrap" onClick={onClose}>
      <div className="om-sheet" onClick={(e) => e.stopPropagation()}>
        <div className="om-sheet-grab" />
        <div className="om-sheet-h">
          <div>
            <h3>{title}</h3>
            <p className="om-sheet-sub">
              {dish.name}
              {dish.freezable ? "（冷凍OK）" : "（冷蔵のみ）"}
            </p>
          </div>
          <button className="om-icon sm" onClick={onClose} aria-label="閉じる">
            <X size={18} />
          </button>
        </div>

        {mode === "move" && dish.freezable && (
          <p className="om-sheet-tip">
            <Snowflake size={13} /> 冷凍できるので、後半にまわすと長持ちします。
          </p>
        )}
        {mode === "move" && !dish.freezable && (
          <p className="om-sheet-tip warn">
            <AlertTriangle size={13} /> 冷蔵のみのおかずです。早めに食べきりましょう。
          </p>
        )}

        <div className="om-sheet-days">
          {days.map((iso) => {
            const load = dishes.filter((d) => d.date === iso && d.id !== dish.id).length;
            const disabled = mode === "move" && from != null && iso <= from;
            const willFreeze = dish.freezable && daysBetween(baseMon, iso) >= settings.freshDays;
            return (
              <button
                key={iso}
                className={"om-sheet-day" + (iso === from ? " current" : "")}
                disabled={disabled}
                onClick={() => onPick(iso)}
              >
                <span className="om-sd-wd">{wdOf(iso)}</span>
                <span className="om-sd-dt">{fmtMD(iso)}</span>
                <span className={"om-sd-store " + (willFreeze ? "frz" : "frd")}>
                  {willFreeze ? "冷凍" : "冷蔵"}
                </span>
                {load > 0 && <span className="om-sd-load">{load}品</span>}
                {iso === from && <span className="om-sd-now">今ここ</span>}
              </button>
            );
          })}
        </div>

        {from != null && (
          <button className="om-ghost wide" onClick={onUnassign}>
            <PackageOpen size={15} /> ストックに戻す
          </button>
        )}
      </div>
    </div>
  );
}

/* ------------------------------ History view ------------------------------ */
function HistoryView({ dishes }) {
  const today = todayISO();
  const [ym, setYm] = useState(() => {
    const d = new Date(today + "T00:00:00");
    return { y: d.getFullYear(), m: d.getMonth() };
  });
  const [sel, setSel] = useState(today);

  const byDate = useMemo(() => {
    const map = {};
    for (const d of dishes) {
      if (d.date) (map[d.date] = map[d.date] || []).push(d);
    }
    return map;
  }, [dishes]);

  const first = new Date(ym.y, ym.m, 1);
  const startOffset = (first.getDay() + 6) % 7; // 月曜からの日数
  const gridStart = addDaysISO(isoOf(first), -startOffset);
  const cells = Array.from({ length: 42 }, (_, i) => addDaysISO(gridStart, i));
  const selItems = byDate[sel] || [];
  const selMains = selItems.filter((d) => d.category === "main");
  const selSides = selItems.filter((d) => d.category === "side");

  const prevM = () => setYm((s) => (s.m === 0 ? { y: s.y - 1, m: 11 } : { y: s.y, m: s.m - 1 }));
  const nextM = () => setYm((s) => (s.m === 11 ? { y: s.y + 1, m: 0 } : { y: s.y, m: s.m + 1 }));

  return (
    <div className="om-history">
      <div className="om-cal">
        <div className="om-cal-nav">
          <button onClick={prevM} aria-label="前の月">
            <ChevronLeft size={18} />
          </button>
          <div className="om-cal-title">
            {ym.y}年{ym.m + 1}月
          </div>
          <button onClick={nextM} aria-label="次の月">
            <ChevronRight size={18} />
          </button>
        </div>
        <div className="om-cal-head">
          {["月", "火", "水", "木", "金", "土", "日"].map((w) => (
            <span key={w}>{w}</span>
          ))}
        </div>
        <div className="om-cal-grid">
          {cells.map((iso) => {
            const d = new Date(iso + "T00:00:00");
            const inMonth = d.getMonth() === ym.m;
            const has = (byDate[iso] || []).length > 0;
            return (
              <button
                key={iso}
                className={
                  "om-cal-cell" +
                  (inMonth ? "" : " out") +
                  (iso === today ? " today" : "") +
                  (iso === sel ? " sel" : "")
                }
                onClick={() => setSel(iso)}
              >
                <span className="om-cal-d">{d.getDate()}</span>
                {has && <span className="om-cal-dot" />}
              </button>
            );
          })}
        </div>
      </div>

      <div className="om-cal-detail">
        <div className="om-cal-detail-h">
          {fmtMD(sel)}（{wdOf(sel)}）の献立
        </div>
        {selItems.length === 0 ? (
          <p className="om-cal-empty">この日の記録はありません。</p>
        ) : (
          <>
            {selMains.length > 0 && <HistoryGroup label="主菜" items={selMains} />}
            {selSides.length > 0 && <HistoryGroup label="副菜" items={selSides} />}
          </>
        )}
      </div>
    </div>
  );
}

function HistoryGroup({ label, items }) {
  return (
    <div className="om-cal-group">
      <span className="om-group-l">{label}</span>
      {items.map((d) => (
        <div key={d.id} className={"om-cal-item" + (d.status === "eaten" ? " eaten" : "")}>
          <span className={"om-row-store " + (d.storage === "frozen" ? "frz" : "frd")}>
            {d.storage === "frozen" ? <Snowflake size={12} /> : <Refrigerator size={12} />}
            {d.storage === "frozen" ? "冷凍" : "冷蔵"}
          </span>
          <span className="om-cal-item-name">{d.name}</span>
          {d.status === "eaten" && <Check size={14} className="om-eaten-i" />}
        </div>
      ))}
    </div>
  );
}

/* ------------------------------ Dishes view ------------------------------ */
function DishesView({
  dishes,
  recipes,
  settings,
  viewMonday,
  viewWeekId,
  menuUpdatedAt,
  onRefreshMenu,
  onAddRecipe,
  onDeleteRecipe,
  onToggleRecipeFreeze,
  onDeleteDish,
  onPlaceRecipe,
  onGoPlan,
}) {
  const [name, setName] = useState("");
  const [category, setCategory] = useState("main");
  const [freezable, setFreezable] = useState(false);
  const [refreshing, setRefreshing] = useState(false);

  const submit = () => {
    if (!name.trim()) return;
    onAddRecipe({ name, category, freezable });
    setName("");
    setFreezable(false);
  };

  const weekTsuk = dishes.filter((d) => d.source === "tsukurioki" && d.weekId === viewWeekId);

  return (
    <div className="om-dishes">
      {/* メニュー更新 */}
      <div className="om-menu-update">
        <span className="om-menu-date">
          メニュー更新日：
          {menuUpdatedAt ? new Date(menuUpdatedAt).toLocaleDateString("ja-JP") : "—（内蔵データ）"}
        </span>
        <button
          className="om-refresh"
          disabled={refreshing}
          onClick={async () => {
            setRefreshing(true);
            await onRefreshMenu();
            setRefreshing(false);
          }}
        >
          <RefreshCw size={14} className={refreshing ? "om-spin" : ""} />
          {refreshing ? "更新中…" : "最新メニューに更新"}
        </button>
      </div>

      {/* じぶんで追加（自作レシピ） */}
      <section className="om-card">
        <h2 className="om-h2">じぶんで追加（自作レシピ）</h2>
        <input
          className="om-input"
          placeholder="おかずの名前（例：肉じゃが）"
          value={name}
          onChange={(e) => setName(e.target.value)}
          onKeyDown={(e) => e.key === "Enter" && submit()}
        />
        <div className="om-seg-row">
          <Seg
            options={[
              ["main", "主菜"],
              ["side", "副菜"],
            ]}
            value={category}
            onChange={setCategory}
          />
        </div>
        <button
          className={"om-freeze-toggle" + (freezable ? " on" : "")}
          onClick={() => setFreezable((v) => !v)}
        >
          {freezable ? <Snowflake size={16} /> : <Refrigerator size={16} />}
          {freezable ? "冷凍できる（後半にまわせる）" : "冷蔵のみ（早めに食べる）"}
          <span className="om-switch" aria-hidden>
            <span className="om-switch-knob" />
          </span>
        </button>
        <button className="om-primary wide" onClick={submit} disabled={!name.trim()}>
          <Plus size={17} /> レシピ帳に追加
        </button>
      </section>

      {/* ツクリオ（選択中の週） */}
      <section className="om-list">
        <div className="om-list-h">
          ツクリオ
          <span className="om-list-wk">
            <CalendarDays size={11} style={{ verticalAlign: "-1px", marginRight: 2 }} />
            {weekLabelFromMonday(viewMonday)}週
          </span>
          <span className="om-list-sub">こんだてで選択中</span>
        </div>
        {weekTsuk.length === 0 ? (
          <p className="om-list-empty">
            この週のツクリオは未取り込みです。
            <button className="om-link" onClick={onGoPlan}>
              「こんだて」
            </button>
            で取り込めます。
          </p>
        ) : (
          weekTsuk.map((d) => (
            <div key={d.id} className="om-row">
              <DishDot d={d} />
              <span className="om-row-cat">{d.category === "main" ? "主菜" : "副菜"}</span>
              <span className="om-row-name">{d.name}</span>
              <span className={"om-row-store static " + (d.freezable ? "frz" : "frd")}>
                {d.freezable ? <Snowflake size={13} /> : <Refrigerator size={13} />}
                {d.freezable ? "冷凍可" : "冷蔵"}
              </span>
              <button className="om-row-del" onClick={() => onDeleteDish(d.id)} aria-label="削除">
                <Trash2 size={15} />
              </button>
            </div>
          ))
        )}
      </section>

      {/* 自作（レシピ帳） */}
      <section className="om-list">
        <div className="om-list-h">
          自作（レシピ帳）
          <span className="om-list-sub">いつでも置ける</span>
        </div>
        {recipes.length === 0 ? (
          <p className="om-list-empty">上の「じぶんで追加」で、よく作るおかずを登録できます。</p>
        ) : (
          recipes.map((r) => (
            <div key={r.id} className="om-row">
              <DishDot d={r} />
              <span className="om-row-cat">{r.category === "main" ? "主菜" : "副菜"}</span>
              <span className="om-row-name">{r.name}</span>
              <button
                className={"om-row-store " + (r.freezable ? "frz" : "frd")}
                onClick={() => onToggleRecipeFreeze(r.id)}
                title="冷蔵／冷凍を切りかえ"
              >
                {r.freezable ? <Snowflake size={13} /> : <Refrigerator size={13} />}
                {r.freezable ? "冷凍可" : "冷蔵"}
              </button>
              <button className="om-row-add" onClick={() => onPlaceRecipe(r)} title="今の週に追加">
                <Plus size={13} /> 今の週へ
              </button>
              <button className="om-row-del" onClick={() => onDeleteRecipe(r.id)} aria-label="削除">
                <Trash2 size={15} />
              </button>
            </div>
          ))
        )}
      </section>

      <p className="om-src-note">
        出典：ツクリオ公式お届けメニュー（毎週金曜に自動取得）。冷凍可否は公式の「冷凍不可」表示にもとづきます。
      </p>
    </div>
  );
}

/* ------------------------------ Settings ------------------------------ */
function SettingsSheet({ settings, onChange, onReset, onClose }) {
  const [confirm, setConfirm] = useState(false);
  return (
    <div className="om-modal-wrap" onClick={onClose}>
      <div className="om-sheet" onClick={(e) => e.stopPropagation()}>
        <div className="om-sheet-grab" />
        <div className="om-sheet-h">
          <h3>設定</h3>
          <button className="om-icon sm" onClick={onClose} aria-label="閉じる">
            <X size={18} />
          </button>
        </div>

        <div className="om-field">
          <span>見た目（テーマ）</span>
          <Seg
            options={[
              ["default", "シンプル"],
              ["heisei", "平成ギャル♡"],
            ]}
            value={settings.theme || "default"}
            onChange={(v) => onChange({ theme: v })}
          />
          <small className="om-hint">「平成ギャル♡」にすると、ピンク全開のデコメ風になります。</small>
        </div>

        <div className="om-field">
          <span>冷蔵で食べきる日数</span>
          <Seg
            options={[
              [2, "2日"],
              [3, "3日"],
              [4, "4日"],
            ]}
            value={settings.freshDays}
            onChange={(v) => onChange({ freshDays: v })}
          />
          <small className="om-hint">これを過ぎる日には、冷凍できるおかずをまわします。</small>
        </div>

        <label className="om-field">
          <span>人数</span>
          <Seg
            options={[
              [1, "1人"],
              [2, "2人"],
              [4, "4人"],
            ]}
            value={settings.people}
            onChange={(v) => onChange({ people: v })}
          />
        </label>

        {!confirm ? (
          <button className="om-danger" onClick={() => setConfirm(true)}>
            <Trash2 size={15} /> すべてリセット
          </button>
        ) : (
          <div className="om-confirm">
            <span>登録したおかず・レシピ・献立を全部消します。よろしいですか？</span>
            <div>
              <button className="om-ghost" onClick={() => setConfirm(false)}>
                やめる
              </button>
              <button className="om-danger" onClick={onReset}>
                消す
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ------------------------------ Segmented ------------------------------ */
function Seg({ options, value, onChange }) {
  return (
    <div className="om-seg" role="group">
      {options.map(([v, label]) => (
        <button key={String(v)} className={value === v ? "on" : ""} onClick={() => onChange(v)}>
          {label}
        </button>
      ))}
    </div>
  );
}

.om-cal-cell{position:relative;aspect-ratio:1/1;border:1px solid transparent;border-radius:9px;background:#FAF8F3;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:0;}
.om-cal-cell.out{opacity:.32;}
.om-cal-cell.today{border-color:var(--accent);}
.om-cal-cell.sel{background:var(--accent-bg);border-color:var(--accent);}
.om-cal-d{font-size:12px;font-weight:700;}
.om-cal-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);}
.om-cal-detail{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;}
.om-cal-detail-h{font-size:13.5px;font-weight:800;margin-bottom:10px;}
.om-cal-empty{font-size:12.5px;color:var(--ink2);margin:2px 0;}
.om-cal-group{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;}
.om-cal-group:last-child{margin-bottom:0;}
.om-cal-item{display:flex;align-items:center;gap:8px;}
.om-cal-item-name{font-size:13px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.om-cal-item.eaten .om-cal-item-name{text-decoration:line-through;color:var(--ink2);}
.om-cal-item .om-eaten-i{margin-left:auto;}

/* modal / sheet */
.om-modal-wrap{position:fixed; inset:0; background:rgba(36,32,28,.42); z-index:30;
  display:flex; align-items:flex-end; justify-content:center; animation:fade .2s ease;}
@keyframes fade{from{opacity:0;}to{opacity:1;}}
.om-sheet{background:var(--bg); width:100%; max-width:760px; border-radius:22px 22px 0 0; padding:8px 18px 26px;
  max-height:88vh; overflow-y:auto; animation:slideup .26s cubic-bezier(.2,.8,.25,1);}
@keyframes slideup{from{transform:translateY(100%);}to{transform:none;}}
.om-sheet-grab{width:38px;height:4px;border-radius:2px;background:#CFC9BC; margin:4px auto 14px;}
.om-sheet-h{display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:6px;}
.om-sheet-h h3{font-size:17px; margin:0; font-weight:800;}
.om-sheet-sub{font-size:12.5px; color:var(--ink2); margin:3px 0 0;}
.om-sheet-tip{display:flex; align-items:center; gap:7px; font-size:12px; font-weight:600; color:var(--frozen);
  background:var(--frozen-bg); border-radius:11px; padding:9px 12px; margin:10px 0;}
.om-sheet-tip.warn{color:var(--warn); background:#FBEAE2;}
.om-sheet-days{display:grid; grid-template-columns:repeat(auto-fill,minmax(86px,1fr)); gap:9px; margin:12px 0;}
.om-sheet-day{position:relative; background:var(--card); border:1px solid var(--line); border-radius:13px;
  padding:11px 6px 9px; display:flex; flex-direction:column; align-items:center; gap:3px;}
.om-sheet-day:hover:not(:disabled){border-color:var(--accent);}
.om-sheet-day:disabled{opacity:.35;}
.om-sheet-day.current{border-color:var(--accent); background:var(--accent-bg);}
.om-sd-wd{font-weight:800; font-size:15px;}
.om-sd-dt{font-size:11px; color:var(--ink2); font-weight:700;}
.om-sd-store{font-size:10px; font-weight:800; padding:1px 6px; border-radius:6px; margin-top:2px;}
.om-sd-store.frd{background:var(--fresh-bg); color:var(--fresh);}
.om-sd-store.frz{background:var(--frozen-bg); color:var(--frozen);}
.om-sd-load{font-size:9.5px; color:var(--ink2); font-weight:700;}
.om-sd-now{position:absolute; top:-7px; right:-4px; background:var(--accent); color:#fff; font-size:9px; font-weight:800; padding:1px 5px; border-radius:6px;}

/* settings fields */
.om-field{display:block; margin:14px 0;}
.om-field>span{display:block; font-size:12.5px; font-weight:800; color:var(--ink2); margin-bottom:7px;}
.om-hint, .om-field small{display:block; font-size:11px; color:var(--ink2); margin-top:6px; line-height:1.5;}
.om-danger{display:inline-flex; align-items:center; gap:7px; background:#FBEAE2; color:var(--warn);
  border:1px solid #F1CFC0; border-radius:12px; padding:12px 16px; font-weight:800; font-size:13px; margin-top:18px;}
.om-confirm{margin-top:18px; background:#FBEAE2; border:1px solid #F1CFC0; border-radius:13px; padding:14px; font-size:12.5px; font-weight:700; color:var(--warn);}
.om-confirm>div{display:flex; gap:9px; margin-top:11px;}
.om-confirm .om-ghost{flex:1; justify-content:center; color:var(--ink2); background:#fff;}
.om-confirm .om-danger{flex:1; justify-content:center; margin:0;}

/* toast */
.om-toast{position:fixed; bottom:22px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff;
  padding:12px 20px; border-radius:13px; font-size:13px; font-weight:700; z-index:50; box-shadow:0 8px 24px rgba(0,0,0,.25);
  animation:toastin .25s ease;}
@keyframes toastin{from{opacity:0; transform:translate(-50%,10px);}to{opacity:1; transform:translate(-50%,0);}}

button:focus-visible{outline:2.5px solid var(--accent); outline-offset:2px;}
@media (prefers-reduced-motion:reduce){*{animation:none !important; transition:none !important;}}
@media (max-width:520px){ .om-chip-name{max-width:120px;} }

/* ============================ 平成ギャル♡テーマ ============================ */
.om-root.theme-heisei{
  --bg:#FFEAF4; --card:#FFFFFF; --ink:#5B2A4A; --ink2:#C98AB0; --line:#FFC2DD;
  --accent:#FF2D8E; --accent-bg:#FFD1E8; --olive:#C9A7FF; --warn:#E0408A;
  --fresh:#1FA89C; --fresh-bg:#D6F6F0; --frozen:#5B8DEF; --frozen-bg:#E3ECFF;
  --grad-candy:linear-gradient(135deg,#FF8FC8 0%,#FF2D8E 100%);
  --font:"M PLUS Rounded 1c","Zen Maru Gothic","Hiragino Maru Gothic ProN","Yu Gothic",system-ui,sans-serif;
  background-color:#FFEAF4;
  background-image:radial-gradient(#FFC9E4 20%,transparent 21%),linear-gradient(180deg,#FFE3F1,#FFEAF4 38%);
  background-size:22px 22px,100% 100%;
}
/* ヘッダー */
.theme-heisei .om-brand h1{
  font-family:"Mochiy Pop One","M PLUS Rounded 1c",sans-serif; font-weight:400;
  background:linear-gradient(#fff,#FFE0F0); -webkit-background-clip:text; background-clip:text; color:transparent;
  -webkit-text-stroke:2px #fff; paint-order:stroke fill; filter:drop-shadow(1.5px 2px 0 #FF2D8E);}
.theme-heisei .om-brand p{color:#E48ABC; font-weight:700;}
.theme-heisei .om-brand p::after{content:" ♡";}
.theme-heisei .om-mark{border-radius:50% 50% 50% 9px; background:var(--grad-candy); box-shadow:0 4px 12px rgba(255,45,142,.4);}
.theme-heisei .om-mark-i{border-radius:50% 50% 50% 3px; background:#fff;}
.theme-heisei .om-icon{border:2px solid #fff; border-radius:14px; color:var(--accent); background:#fff; box-shadow:0 3px 0 #FFC2DD;}
/* タブ＝グミ */
.theme-heisei .om-tabs button{border:2px solid #fff; border-radius:999px; background:#fff; color:#C98AB0; font-weight:800; box-shadow:0 3px 0 #FFD1E8;}
.theme-heisei .om-tabs button.on{background:var(--grad-candy); color:#fff; border-color:#fff; box-shadow:0 4px 0 #E01b76; transform:translateY(-1px);}
/* ボタン */
.theme-heisei .om-primary{background:var(--grad-candy); border:3px solid #fff; border-radius:999px; font-weight:800;
  box-shadow:0 6px 0 #E01b76,0 10px 16px rgba(255,45,142,.35); text-shadow:0 2px 0 rgba(224,27,118,.5);}
.theme-heisei .om-primary:active{transform:translateY(3px); box-shadow:0 2px 0 #E01b76,0 4px 8px rgba(255,45,142,.3);}
.theme-heisei .om-ghost{border:2px solid #FFC2DD; border-radius:999px; background:#fff; color:var(--accent); font-weight:800;}
.theme-heisei .om-refresh{border:2px solid #fff; border-radius:999px; box-shadow:0 3px 0 #FFD1E8;}
.theme-heisei .om-link{color:var(--accent);}
/* 週ナビ */
.theme-heisei .om-weeknav-arrow{border:2px solid #fff; border-radius:16px; box-shadow:0 3px 0 #FFD1E8; color:var(--accent);}
.theme-heisei .om-weeknav-c{border:2px solid #fff; border-radius:18px; box-shadow:0 3px 0 #FFD1E8;}
.theme-heisei .om-weeknav-label{color:var(--accent);}
.theme-heisei .om-weeknav-badge.now{background:var(--grad-candy);}
/* カード類＝ステッカー帳 */
.theme-heisei .om-card,.theme-heisei .om-shelf,.theme-heisei .om-list,.theme-heisei .om-cal,.theme-heisei .om-cal-detail{
  border:3px solid #fff; border-radius:26px; box-shadow:0 10px 22px rgba(255,95,174,.22),0 0 0 3px #FFEAF4;}
.theme-heisei .om-shelf-h{color:var(--accent);}
.theme-heisei .om-shelf-h::before{content:"♡"; margin-right:2px;}
.theme-heisei .om-h2{color:var(--accent);}
.theme-heisei .om-day{border:3px solid #fff; border-radius:22px; box-shadow:0 8px 18px rgba(255,95,174,.2);}
.theme-heisei .om-day.today{border-color:#fff; box-shadow:0 0 0 3px var(--accent),0 8px 18px rgba(255,45,142,.3);}
.theme-heisei .om-day-h{background:linear-gradient(135deg,#FFE3F1,#FFD1E8); border-bottom-color:#FFC2DD;}
.theme-heisei .om-today-tag{background:var(--grad-candy);}
.theme-heisei .om-day-empty{color:#F3B8D6;}
/* チップ・ピル */
.theme-heisei .om-chip{border:2px solid #fff; border-radius:999px; background:#FFF7FB; box-shadow:0 3px 6px rgba(255,95,174,.2);}
.theme-heisei .om-chip:hover{background:var(--accent-bg); border-color:#fff;}
.theme-heisei .om-pd{border-radius:14px;}
.theme-heisei .om-row-cat,.theme-heisei .om-cal-head span{color:#B96AA0;}
/* 入力・セグ・スイッチ */
.theme-heisei .om-input{border:3px solid #FFC2DD; border-radius:16px; background:#FFF7FB; font-weight:700;}
.theme-heisei .om-input:focus{border-color:var(--accent); box-shadow:0 0 0 4px #FFD1E8;}
.theme-heisei .om-seg{background:#FFE3F1; border:2px solid #fff; border-radius:999px;}
.theme-heisei .om-seg button{border-radius:999px; color:#C98AB0; font-weight:800;}
.theme-heisei .om-seg button.on{background:var(--grad-candy); color:#fff; box-shadow:0 2px 6px rgba(255,45,142,.4);}
.theme-heisei .om-switch{background:#FFD1E8; border:2px solid #fff;}
.theme-heisei .om-freeze-toggle{border:2px solid #fff; border-radius:16px;}
.theme-heisei .om-freeze-toggle.on .om-switch,.theme-heisei .om-mini-toggle.on .om-switch{background:var(--grad-candy);}
/* 取り込みバナー */
.theme-heisei .om-import{border:3px solid #fff; border-radius:22px; background:linear-gradient(135deg,#FFF3B0,#FFE3F1); box-shadow:0 8px 18px rgba(255,95,174,.22);}
.theme-heisei .om-import-t{color:#C0398A;}
/* カレンダー */
.theme-heisei .om-cal-cell{border-radius:14px; background:#FFF7FB;}
.theme-heisei .om-cal-cell.today{border-color:var(--accent);}
.theme-heisei .om-cal-cell.sel{background:var(--accent-bg); border-color:var(--accent);}
.theme-heisei .om-cal-dot{background:var(--accent);}
.theme-heisei .om-cal-title,.theme-heisei .om-cal-detail-h{color:var(--accent);}
/* シート・トースト */
.theme-heisei .om-sheet{background:#FFEAF4;}
.theme-heisei .om-sheet-h h3{color:var(--accent); font-family:"Mochiy Pop One","M PLUS Rounded 1c",sans-serif; font-weight:400;}
.theme-heisei .om-sheet-day{border:2px solid #fff; border-radius:16px; box-shadow:0 3px 0 #FFD1E8;}
.theme-heisei .om-sheet-day.current{border-color:var(--accent);}
.theme-heisei .om-toast{background:var(--grad-candy); border:2px solid #fff; border-radius:999px;}
.theme-heisei .om-danger{border-radius:999px; border:2px solid #fff;}
`;

<script>
(function () {
  function boot() {
    try {
      var src = document.getElementById("app-src").textContent;
      var code = Babel.transform(src, { presets: ["react"] }).code;
      (0, eval)(code);
    } catch (e) {
      var r = document.getElementById("root");
      if (r) r.innerHTML = '<div class="om-boot">読み込みに失敗しました。ページを再読み込みしてください。</div>';
      throw e;
    }
  }
  var n = 0;
  var t = setInterval(function () {
    if (window.Babel && window.React && window.ReactDOM) { clearInterval(t); boot(); }
    else if (++n > 400) { clearInterval(t); }
  }, 50);
})();
</script>
